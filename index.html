<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-blob" aria-hidden="true"></div>

    <main class="page">
      <div class="container center-stage">
        <section class="glass panel fade-in" style="max-width: 720px; text-align: center">
          <div class="brand" style="justify-content: center; margin-bottom: 8px">
            <div class="logo" aria-hidden="true"></div>
            <div class="brand-title">AI Learning</div>
          </div>
          <p class="subtitle" style="margin: 0">
            Checking your session...
          </p>
        </section>
      </div>
    </main>

    <script type="module">
      import { getAuth } from "./auth.js";

      const auth = getAuth();
      if (auth) {
        window.location.replace("./app.html");
      } else {
        window.location.replace("./sign-in.html");
      }
    </script>
  </body>
</html>
