<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - AI Learning</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-blob" aria-hidden="true"></div>

    <main class="page">
      <div class="container center-stage">
        <section class="glass auth-card fade-in">
          <div class="panel-header" style="padding: 22px 22px 0 22px">
            <div class="brand">
              <div class="logo" aria-hidden="true"></div>
              <div class="brand-title">AI Learning</div>
            </div>
            <a class="btn btn-link" href="./index.html">Home</a>
          </div>

          <div class="auth-rows" style="padding-top: 6px">
            <div class="panel">
              <h1 class="title">Welcome back</h1>
              <p class="subtitle">
                Flowy lessons, fast practice, and a bright learning space.
              </p>

              <div class="hero-badges" aria-hidden="true">
                <div class="badge">
                  <div class="dot"></div>
                  <span style="font-weight: 800">Rounded</span>
                </div>
                <div class="badge">
                  <div class="dot"></div>
                  <span style="font-weight: 800">Light</span>
                </div>
                <div class="badge">
                  <div class="dot"></div>
                  <span style="font-weight: 800">Flow</span>
                </div>
              </div>
            </div>

            <div class="card form">
              <form id="signInForm" autocomplete="on" novalidate>
                <div class="form-row">
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" placeholder="you@example.com" required />
                </div>
                <div class="form-row">
                  <label for="password">Password</label>
                  <input id="password" name="password" type="password" placeholder="********" required minlength="4" />
                </div>

                <div class="btn-row">
                  <button class="btn btn-primary" type="submit" id="submitBtn">
                    Continue
                    <span aria-hidden="true" style="font-weight: 900">-></span>
                  </button>
                  <button class="btn btn-ghost" type="button" id="demoBtn" title="Use a demo user">
                    Demo sign-in
                  </button>
                </div>

                <p class="hint" id="reasonLine" style="margin-bottom: 0"></p>
                <p class="hint" style="margin-top: 10px">
                  This is a frontend-only prototype. Signing is simulated (no backend yet).
                </p>
              </form>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module">
      import { getAuth, setAuth, clearAuth } from "./auth.js";

      function toast(message) {
        const el = document.getElementById("toast");
        el.textContent = message;
        el.style.display = "block";
        setTimeout(() => {
          el.style.display = "none";
        }, 2200);
      }

      const params = new URLSearchParams(window.location.search);
      const reason = params.get("reason");
      const reasonLine = document.getElementById("reasonLine");
      if (reason) {
        reasonLine.textContent = reason;
      }

      // If already signed in, skip.
      const existing = getAuth();
      if (existing) window.location.replace("./app.html");

      const form = document.getElementById("signInForm");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const submitBtn = document.getElementById("submitBtn");
      const demoBtn = document.getElementById("demoBtn");

      demoBtn.addEventListener("click", () => {
        // Keep it deterministic so the prototype feels stable.
        emailEl.value = "demo@ailearn.dev";
        passwordEl.value = "demo1234";
        toast("Demo credentials filled.");
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = emailEl.value.trim();
        const password = passwordEl.value;

        // Prototype validation (no real auth server yet).
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          toast("Please enter a valid email.");
          emailEl.focus();
          return;
        }
        if (!password || password.length < 4) {
          toast("Please enter your password.");
          passwordEl.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";

        setTimeout(() => {
          clearAuth(); // Ensure a clean state for the prototype.
          setAuth({ email, name: email.split("@")[0] });
          toast("Signed in!");
          window.location.replace("./app.html");
        }, 450);
      });
    </script>
  </body>
</html>
